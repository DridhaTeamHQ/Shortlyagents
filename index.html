<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shortly Agents</title>
  <style>
    :root {
      --bg: #f6f5fb;
      --panel: rgba(255, 255, 255, 0.92);
      --card: #ffffff;
      --ink: #17141f;
      --muted: #6e6880;
      --line: #e6e1f2;
      --accent: #6b46e8;
      --accent-soft: #ece5ff;
      --shadow: 0 18px 48px rgba(32, 22, 60, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 28%),
        linear-gradient(180deg, #f7f3ff 0%, #f0e9ff 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app-shell {
      min-height: 100vh;
      padding-bottom: 28px;
      position: relative;
      isolation: isolate;
    }

    .pattern-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle at top right, rgba(122, 72, 255, 0.24), transparent 38%),
        radial-gradient(circle at bottom left, rgba(155, 110, 255, 0.16), transparent 34%),
        linear-gradient(180deg, #f4efff 0%, #ede5ff 100%);
    }

    .pattern-bg * {
      border: 0;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .pattern-bg .press {
      position: absolute;
      inset: 0;
      overflow: hidden;
      font-size: 16px;
      color: #6f42ff;
      opacity: 0.18;
      transform: translate(20%, 20%) scale(0.72);
      transform-origin: center;
    }

    .pattern-bg .sheet {
      overflow: hidden;
    }

    .pattern-bg .sheet,
    .pattern-bg .sheet:before,
    .pattern-bg .roll {
      position: absolute;
    }

    .pattern-bg .sheet,
    .pattern-bg .roll {
      top: 50%;
      left: 50%;
    }

    .pattern-bg .sheet {
      width: 4em;
      height: 6em;
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg);
    }

    .pattern-bg .sheet:before {
      animation: print 0.5s ease-in-out infinite;
      background:
        linear-gradient(#0000 5.2em, currentColor 5.2em 5.3em, #0000 5.3em 5.5em)
          0.4em 0 / 3.2em 6em,
        linear-gradient(#0000 5.5em, currentColor 5.5em 5.7em, #0000 5.7em) 0.6em 0 /
          2.8em 6em,
        linear-gradient(
            90deg,
            #ffffff 0.4em,
            #0000 0.4em 1.9em,
            #f3ebff 1.9em 2.1em,
            #0000 2.1em 3.6em,
            #ffffff 3.6em
          )
          0 0 / 4em 6em,
        repeating-linear-gradient(
            #f7f1ff 0 0.4em,
            #0000 0.4em 5em,
            #efe4ff 5em 6em,
            #0000 6em
          )
          0 0 / 4em 6em,
        linear-gradient(#0000 3.4em, currentColor 3.4em) 100% 0 / 50% 6em,
        repeating-linear-gradient(currentColor 0 0.2em, #ffffff 0.2em 0.4em) 0 0 /
          4em 6em;
      background-repeat: repeat-y;
      color: #7a48ff;
      content: "";
      display: block;
      top: -6em;
      left: 0;
      width: 100%;
      height: calc(100% + 6em);
    }

    .pattern-bg .sheet:nth-child(1):before,
    .pattern-bg .sheet:nth-child(5):before {
      color: #b18dff;
    }

    .pattern-bg .sheet:nth-child(n + 7):nth-child(-n + 9) {
      height: 0.4em;
    }

    .pattern-bg .sheet:nth-child(1) {
      height: 42em;
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-17.4em, 9.4em) rotateX(-90deg);
    }

    .pattern-bg .sheet:nth-child(3) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-2.5em, -2.5em);
    }

    .pattern-bg .sheet:nth-child(5) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-0.5em, -0.7em) rotateX(-75deg);
    }

    .pattern-bg .sheet:nth-child(7) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(1.7em, -1.85em) rotateX(-15deg);
    }

    .pattern-bg .sheet:nth-child(7):before {
      background-position-y: 5.2em;
    }

    .pattern-bg .sheet:nth-child(8) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(1.7em, -1.5em) rotateX(15deg);
    }

    .pattern-bg .sheet:nth-child(8):before {
      background-position-y: 4.8em;
    }

    .pattern-bg .sheet:nth-child(9) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(1.6em, -1.05em) rotateX(45deg);
    }

    .pattern-bg .sheet:nth-child(9):before {
      background-position-y: 4.4em;
    }

    .pattern-bg .sheet:nth-child(10):before,
    .pattern-bg .sheet:nth-child(11):before {
      background-position-y: 4em;
    }

    .pattern-bg .sheet:nth-child(10) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-0.5em, 1.95em) rotateX(75deg);
    }

    .pattern-bg .sheet:nth-child(11) {
      height: 29em;
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-2.5em, 19.25em);
    }

    .pattern-bg .roll {
      background-color: #8652ff;
      background-image: radial-gradient(
        1em 2em at 0.5em 50%,
        #6435dc 49%,
        #0000 50%
      );
      border-radius: 0.5em / 1em;
      width: 8em;
      height: 2em;
    }

    .pattern-bg .roll:nth-child(2) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-3em, -4.5em) skewX(-22.5deg);
    }

    .pattern-bg .roll:nth-child(4) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-2em, -0.5em) skewX(-22.5deg);
    }

    .pattern-bg .roll:nth-child(6) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(1em, -1em) skewX(-22.5deg);
    }

    .pattern-bg .roll:nth-child(12) {
      transform: translate(-50%, -50%) rotateX(-45deg) rotateZ(-45deg)
        translate(-2em, 4.45em) skewX(-22.5deg);
    }
    }

    .topbar,
    .hero,
    .details,
    .footer {
      width: min(1240px, calc(100% - 32px));
      margin-left: auto;
      margin-right: auto;
    }

    .topbar {
      width: min(1240px, calc(100% - 32px));
      margin-top: 18px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid rgba(123, 97, 204, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 16px 34px rgba(27, 18, 56, 0.08);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 14px;
      z-index: 5;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .toggle-chip {
      border: 1px solid rgba(107, 70, 232, 0.18);
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(243, 236, 255, 0.92));
      color: #3c2a78;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      white-space: nowrap;
    }

    .toggle-chip:hover,
    .toggle-chip:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(107, 70, 232, 0.3);
      box-shadow: 0 12px 24px rgba(50, 28, 110, 0.08);
      outline: none;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-text {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      line-height: 0.9;
      font-weight: 900;
      letter-spacing: -0.05em;
      font-size: clamp(1.8rem, 2.4vw, 2.6rem);
      white-space: nowrap;
    }

    .brand-text .shortly {
      display: inline-block;
      background: linear-gradient(180deg, #845dff 0%, #6b46e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-text .agents {
      display: inline-block;
      color: var(--ink);
    }

    .hero {
      margin-top: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(420px, 0.95fr);
      gap: clamp(24px, 3vw, 40px);
      align-items: center;
      padding: clamp(26px, 3.2vw, 40px);
      border: 1px solid rgba(123, 97, 204, 0.12);
      border-radius: 34px;
      background:
        radial-gradient(circle at top right, rgba(132, 93, 255, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(248, 244, 255, 0.94));
      box-shadow: 0 22px 52px rgba(27, 18, 56, 0.08);
    }

    .copy {
      min-width: 0;
      padding: 6px 0;
    }

    .copy h1 {
      margin: 0 0 16px;
      font-size: clamp(3.1rem, 4.6vw, 5rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
      max-width: 8.5ch;
      text-wrap: balance;
    }

    .copy p {
      margin: 0;
      max-width: 54ch;
      color: #635a78;
      font-size: 1.02rem;
      line-height: 1.7;
    }

    .card-stage {
      position: relative;
      min-height: 360px;
      display: grid;
      place-items: center;
      isolation: isolate;
      min-width: 0;
      padding: 18px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(244, 238, 255, 0.42));
    }

    .card-stage::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 26px;
      background:
        radial-gradient(circle at 30% 30%, rgba(107, 70, 232, 0.14), transparent 30%),
        radial-gradient(circle at 75% 70%, rgba(107, 70, 232, 0.1), transparent 34%),
        linear-gradient(180deg, rgba(237, 231, 255, 0.92), rgba(231, 223, 255, 0.72));
      z-index: -1;
      filter: blur(1px);
    }

    .launch-grid {
      width: min(100%, 620px);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      transform: none;
      margin-top: 0;
      min-width: 0;
      align-items: stretch;
    }

    .launch-card {
      width: 100%;
      min-height: 144px;
      padding: 18px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 238, 255, 0.92));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        0 18px 34px rgba(18, 14, 35, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, filter 180ms ease;
    }

    .launch-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 58%);
      pointer-events: none;
    }

    .launch-card::after {
      content: "";
      position: absolute;
      inset: auto -20% 14px;
      height: 36px;
      background: radial-gradient(circle, rgba(107, 70, 232, 0.18), transparent 68%);
      filter: blur(12px);
      pointer-events: none;
    }

    .launch-card:hover,
    .launch-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 24px 46px rgba(18, 14, 35, 0.16);
      border-color: rgba(107, 70, 232, 0.18);
      filter: saturate(1.08);
      outline: none;
    }

    .launch-card:active {
      transform: translateY(-1px) scale(0.99);
    }

    .launch-card.slant-left {
      transform: none;
    }

    .launch-card.slant-right {
      transform: none;
    }

    .launch-card.coming-soon {
      transform: none;
      cursor: default;
      opacity: 0.94;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 242, 255, 0.96)),
        repeating-linear-gradient(
          135deg,
          rgba(107, 70, 232, 0.04) 0 10px,
          rgba(107, 70, 232, 0.01) 10px 20px
        );
    }

    .launch-card.coming-soon:hover,
    .launch-card.coming-soon:focus-visible {
      transform: none;
      box-shadow: 0 18px 34px rgba(18, 14, 35, 0.12);
      border-color: rgba(255, 255, 255, 0.75);
    }

    .pix-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(237, 229, 255, 0.96));
      border-bottom: 5px solid #8e73f2;
    }

    .shortly-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(233, 222, 255, 0.96));
      border-bottom: 5px solid var(--accent);
    }

    .digest-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 240, 255, 0.96));
      border-bottom: 5px solid #cdc4ec;
    }

    .launch-card-name {
      font-size: clamp(2rem, 2.6vw, 2.5rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
      font-weight: 900;
      max-width: 7ch;
      text-wrap: balance;
      position: relative;
      z-index: 1;
      color: var(--accent);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .launch-card-name .suffix {
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
    }

    .details {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .admin-shell {
      width: min(1140px, calc(100% - 32px));
      margin: 28px auto 0;
      display: grid;
      gap: 18px;
    }

    .admin-panel {
      border: 1px solid rgba(107, 70, 232, 0.14);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 240, 255, 0.94));
      box-shadow: var(--shadow);
      padding: clamp(20px, 3vw, 30px);
    }

    .admin-login-panel {
      width: min(560px, calc(100% - 32px));
      margin: 28px auto 0;
      border: 1px solid rgba(107, 70, 232, 0.14);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 239, 255, 0.95));
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 30px);
    }

    .admin-login-panel h2 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.35rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .admin-login-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .admin-login-error {
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(208, 52, 108, 0.08);
      color: #a42c56;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .agent-login-panel {
      width: min(560px, calc(100% - 32px));
      margin: 28px auto 0;
      border: 1px solid rgba(107, 70, 232, 0.14);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 239, 255, 0.95));
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 30px);
    }

    .agent-login-panel h2 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 3vw, 2.35rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .agent-login-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .agent-login-note {
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(107, 70, 232, 0.08);
      color: #5c38c6;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .admin-header h2 {
      margin: 0;
      font-size: clamp(1.7rem, 2.6vw, 2.3rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .admin-header p,
    .admin-empty,
    .admin-subtitle,
    .user-meta {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .admin-badge {
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(107, 70, 232, 0.08);
      color: #5431c1;
      font-size: 0.9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .admin-card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      padding: 18px;
      min-width: 0;
    }

    .admin-card h3 {
      margin: 0 0 6px;
      font-size: 1.15rem;
      line-height: 1.15;
    }

    .admin-form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .admin-field {
      display: grid;
      gap: 6px;
    }

    .admin-field label {
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #43336f;
    }

    .admin-field input,
    .admin-field select {
      width: 100%;
      border: 1px solid rgba(107, 70, 232, 0.14);
      border-radius: 14px;
      background: #fff;
      padding: 12px 14px;
      color: var(--ink);
      font: inherit;
    }

    .admin-field input:focus,
    .admin-field select:focus {
      outline: 2px solid rgba(107, 70, 232, 0.18);
      border-color: rgba(107, 70, 232, 0.34);
    }

    .admin-button,
    .user-action {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .admin-button {
      background: linear-gradient(135deg, #6b46e8 0%, #8d5cff 100%);
      color: #fff;
      box-shadow: 0 16px 24px rgba(75, 43, 168, 0.2);
    }

    .admin-button:hover,
    .admin-button:focus-visible,
    .user-action:hover,
    .user-action:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .user-list {
      display: grid;
      gap: 14px;
    }

    .user-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 244, 255, 0.94));
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .user-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .user-row strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .user-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-tag {
      border-radius: 999px;
      padding: 8px 10px;
      background: var(--accent-soft);
      color: #5733c9;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .user-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .user-actions > * {
      flex: 1 1 220px;
      text-align: center;
    }

    .user-action.primary {
      background: linear-gradient(135deg, #6b46e8 0%, #8d5cff 100%);
      color: #fff;
    }

    .user-action.secondary {
      background: rgba(107, 70, 232, 0.08);
      color: #5a39c5;
    }

    .detail {
      min-height: 148px;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(247, 242, 255, 0.9));
      box-shadow: 0 14px 28px rgba(27, 18, 56, 0.05);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .detail:hover {
      transform: translateY(-2px);
      border-color: rgba(107, 70, 232, 0.14);
      box-shadow: 0 16px 30px rgba(27, 18, 56, 0.07);
    }

    .detail-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 1rem;
      font-weight: 800;
      color: #2a2140;
    }

    .detail-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #8b67ff 0%, #6b46e8 100%);
      box-shadow: 0 0 0 4px rgba(107, 70, 232, 0.08);
      flex: 0 0 auto;
    }

    .detail span {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.86rem;
      padding-bottom: 10px;
    }

    @media (max-width: 980px) {
      .topbar,
      .hero,
      .details,
      .footer {
        width: min(100% - 24px, 1140px);
      }

      .admin-shell,
      .admin-login-panel,
      .agent-login-panel {
        width: min(100% - 24px, 1140px);
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 18px;
        padding: 22px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        position: static;
        padding: 14px 18px;
      }

      .topbar-actions {
        margin-left: 0;
        width: 100%;
        justify-content: flex-start;
      }

      .card-stage {
        min-height: auto;
        padding: 16px;
      }

      .admin-grid {
        grid-template-columns: 1fr;
      }

      .admin-header,
      .user-row {
        flex-direction: column;
      }
    }

    @media (max-width: 700px) {
      .topbar,
      .hero,
      .details,
      .footer,
      .admin-shell,
      .admin-login-panel,
      .agent-login-panel {
        width: calc(100% - 20px);
      }

      .topbar {
        top: 0;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 18px;
      }

      .brand-text {
        font-size: 1.2rem;
        gap: 8px;
        white-space: normal;
        line-height: 1;
      }

      .toggle-chip,
      .admin-button,
      .user-action {
        width: 100%;
      }

      .topbar-actions {
        flex-wrap: wrap;
        gap: 8px;
      }

      .launch-grid,
      .details {
        grid-template-columns: 1fr;
      }

      .launch-grid {
        transform: none;
      }

      .launch-card,
      .launch-card.slant-left,
      .launch-card.slant-right,
      .launch-card.coming-soon,
      .launch-card:hover,
      .launch-card:focus-visible,
      .launch-card.slant-left:hover,
      .launch-card.slant-left:focus-visible,
      .launch-card.slant-right:hover,
      .launch-card.slant-right:focus-visible,
      .launch-card.coming-soon:hover,
      .launch-card.coming-soon:focus-visible {
        transform: none;
      }

      .copy h1 {
        max-width: none;
        margin-top: 8px;
        font-size: clamp(2.15rem, 12vw, 3rem);
        line-height: 0.98;
      }

      .copy p {
        font-size: 0.95rem;
      }

      .launch-card {
        min-height: 108px;
        padding: 16px 14px;
      }

      .launch-card-name {
        font-size: clamp(1.55rem, 8vw, 2rem);
        max-width: none;
      }

      .details {
        gap: 12px;
      }

      .detail,
      .admin-card,
      .admin-login-panel,
      .agent-login-panel,
      .admin-panel {
        border-radius: 18px;
        padding: 16px;
      }

      .admin-header h2,
      .admin-login-panel h2,
      .agent-login-panel h2 {
        font-size: clamp(1.45rem, 8vw, 1.9rem);
      }

      .admin-badge {
        white-space: normal;
      }

      .user-card {
        padding: 16px;
        border-radius: 18px;
      }

      .user-actions > * {
        flex-basis: 100%;
      }

      .footer {
        padding-bottom: 18px;
      }
    }

    @media (max-width: 420px) {
      .copy h1 {
        font-size: clamp(1.9rem, 11vw, 2.4rem);
      }

      .brand-text {
        font-size: 1.05rem;
      }

      .launch-card-name {
        font-size: 1.4rem;
      }

      .detail-head {
        font-size: 0.94rem;
      }

      .detail span,
      .admin-header p,
      .admin-empty,
      .admin-subtitle,
      .user-meta,
      .admin-login-panel p,
      .agent-login-panel p {
        font-size: 0.92rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .launch-card,
      .detail,
      .pattern-bg .sheet:before {
        transition: none;
        animation: none;
      }
    }

    @keyframes print {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(6em);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    const launchCards = [
      {
        id: "pix-agent",
        name: "Pix Agent",
        href: "https://pix-agent.vercel.app/",
        className: "pix-card slant-left",
        live: true
      },
      {
        id: "shortly-ai-agent",
        name: "Shortly AI Agent",
        href: "https://aishortlywebupdate-i1yc.vercel.app/login",
        className: "shortly-card slant-right",
        live: true
      },
      {
        id: "daily-digest-agent",
        name: "Daily Digest Agent",
        href: "https://shortly-email-agent.vercel.app/dashboard",
        className: "digest-card",
        live: true
      }
    ];

    const agentById = Object.fromEntries(
      launchCards.map((card) => [card.id, card])
    );

    const details = [
      {
        title: "Pix Agent",
        body: "A direct workspace for Pix-related tasks and focused execution when you want to jump straight into that flow."
      },
      {
        title: "Shortly AI Agent",
        body: "The main Shortly workspace for your core agent experience, designed as the primary entry point in this hub."
      },
      {
        title: "Daily Digest Agent",
        body: "An upcoming agent reserved for future daily summaries, updates, and recurring digest-style workflows."
      }
    ];

    const e = React.createElement;
    const { useEffect, useMemo, useState } = React;
    const API_HEADERS = { "Content-Type": "application/json" };

    async function apiRequest(url, options = {}) {
      const response = await fetch(url, {
        credentials: "same-origin",
        ...options,
        headers: {
          ...(options.body ? API_HEADERS : {}),
          ...(options.headers || {})
        }
      });

      let payload = {};

      try {
        payload = await response.json();
      } catch (error) {
        payload = {};
      }

      if (!response.ok) {
        throw new Error(payload.error || "Request failed.");
      }

      return payload;
    }

    function buildAgentHref(agent, login) {
      if (!agent || !agent.href) {
        return null;
      }

      const url = new URL(agent.href);
      url.searchParams.set("agentLoginId", login.id);
      url.searchParams.set("agentUserName", login.displayName);
      url.searchParams.set("agentUserEmail", login.email);
      url.searchParams.set("agentUsername", login.username);
      return url.toString();
    }

    function LaunchCard({ card, onOpenLogin }) {
      const suffix = "Agent";
      const prefix = card.name.endsWith(" " + suffix)
        ? card.name.slice(0, -(" " + suffix).length)
        : card.name;

      const content = e(
        "span",
        { className: "launch-card-name" },
        prefix + " ",
        e("span", { className: "suffix" }, suffix)
      );

      return e(
        "button",
        {
          className: "launch-card " + card.className,
          type: "button",
          onClick: () => onOpenLogin(card.id),
          "aria-label": "Open " + card.name
        },
        content
      );
    }

    function DetailCard(item) {
      return e(
        "article",
        { className: "detail", key: item.title },
        e(
          "div",
          { className: "detail-head" },
          e("span", { className: "detail-dot", "aria-hidden": "true" }),
          e("strong", null, item.title)
        ),
        e("span", null, item.body)
      );
    }

    function AdminPanel({ logins, onCreateLogin, onDeleteLogin, busy, requestError }) {
      const [selectedAgentId, setSelectedAgentId] = useState(launchCards[0].id);
      const [newDisplayName, setNewDisplayName] = useState("");
      const [newUsername, setNewUsername] = useState("");
      const [newPassword, setNewPassword] = useState("");
      const [newEmail, setNewEmail] = useState("");
      const [newAgentId, setNewAgentId] = useState(launchCards[0].id);

      const filteredUsers = useMemo(
        () => logins.filter((login) => login.agentId === selectedAgentId),
        [logins, selectedAgentId]
      );

      function addUser(event) {
        event.preventDefault();

        const trimmedName = newDisplayName.trim();
        const trimmedUsername = newUsername.trim();
        const trimmedPassword = newPassword.trim();
        const trimmedEmail = newEmail.trim().toLowerCase();

        if (!trimmedName || !trimmedEmail || !trimmedUsername || !trimmedPassword) {
          return;
        }

        onCreateLogin({
          agentId: newAgentId,
          displayName: trimmedName,
          username: trimmedUsername,
          password: trimmedPassword,
          email: trimmedEmail
        }).then((created) => {
          if (!created) {
            return;
          }

          setNewDisplayName("");
          setNewUsername("");
          setNewPassword("");
          setNewEmail("");
        });
      }

      function removeAccess(loginId) {
        onDeleteLogin(loginId);
      }

      return e(
        "section",
        { className: "admin-shell", id: "admin", "aria-label": "Admin controls" },
        e(
          "div",
          { className: "admin-panel" },
          e(
            "div",
            { className: "admin-header" },
            e(
              "div",
              null,
              e("h2", null, "Admin logins by agent"),
              e(
                "p",
                { className: "admin-subtitle" },
                "Create separate usernames and passwords for Pix, Shortly AI, and Daily Digest from one place."
              )
            ),
            e("div", { className: "admin-badge" }, logins.length + " login records")
          ),
          e(
            "div",
            { className: "admin-grid" },
            e(
              "aside",
              { className: "admin-card" },
              e("h3", null, "Add an agent login"),
              e(
                "p",
                { className: "admin-subtitle" },
                "Each record is valid only for the selected agent."
              ),
              e(
                "form",
                { className: "admin-form", onSubmit: addUser },
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "agent-picker" }, "Agent"),
                  e(
                    "select",
                    {
                      id: "agent-picker",
                      value: newAgentId,
                      onChange: (event) => setNewAgentId(event.target.value),
                      disabled: busy
                    },
                    launchCards.map((card) =>
                      e(
                        "option",
                        { value: card.id, key: card.id },
                        card.name + (card.live ? "" : " (coming soon)")
                      )
                    )
                  )
                ),
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "user-name" }, "Display name"),
                  e("input", {
                    id: "user-name",
                    value: newDisplayName,
                    onChange: (event) => setNewDisplayName(event.target.value),
                    placeholder: "Priya Sharma",
                    disabled: busy
                  })
                ),
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "agent-username" }, "Login username"),
                  e("input", {
                    id: "agent-username",
                    value: newUsername,
                    onChange: (event) => setNewUsername(event.target.value),
                    placeholder: "priya.pix",
                    disabled: busy
                  })
                ),
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "agent-password" }, "Login password"),
                  e("input", {
                    id: "agent-password",
                    type: "password",
                    value: newPassword,
                    onChange: (event) => setNewPassword(event.target.value),
                    placeholder: "Create a password",
                    disabled: busy
                  })
                ),
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "user-email" }, "Support email"),
                  e("input", {
                    id: "user-email",
                    type: "email",
                    value: newEmail,
                    onChange: (event) => setNewEmail(event.target.value),
                    placeholder: "priya@shortly.ai",
                    disabled: busy
                  })
                ),
                requestError
                  ? e("div", { className: "admin-login-error", role: "alert" }, requestError)
                  : null,
                e(
                  "button",
                  { className: "admin-button", type: "submit", disabled: busy },
                  busy ? "Saving..." : "Save access"
                )
              )
            ),
            e(
              "div",
              { className: "admin-card" },
              e("h3", null, "Logins by agent"),
              e(
                "p",
                { className: "admin-subtitle" },
                "Agent cards now open a login screen first and validate against these records."
              ),
              e(
                "div",
                { className: "admin-form" },
                e(
                  "div",
                  { className: "admin-field" },
                  e("label", { htmlFor: "agent-filter" }, "View agent"),
                  e(
                    "select",
                    {
                      id: "agent-filter",
                      value: selectedAgentId,
                      onChange: (event) => setSelectedAgentId(event.target.value)
                    },
                    launchCards.map((card) =>
                      e("option", { value: card.id, key: card.id }, card.name)
                    )
                  )
                )
              ),
              filteredUsers.length
                ? e(
                    "div",
                    { className: "user-list" },
                    filteredUsers.map((user) => {
                      const agent = agentById[selectedAgentId];
                      const launchHref = buildAgentHref(agent, user);
                      return e(
                        "article",
                        { className: "user-card", key: user.id + "-" + selectedAgentId },
                        e(
                          "div",
                          { className: "user-row" },
                          e(
                            "div",
                            null,
                            e("strong", null, user.displayName),
                            e("p", { className: "user-meta" }, user.username + " • " + user.email)
                          ),
                          e(
                            "div",
                            { className: "user-tags" },
                            e(
                              "span",
                              { className: "user-tag" },
                              agentById[user.agentId] ? agentById[user.agentId].name : user.agentId
                            )
                          )
                        ),
                        e(
                          "div",
                          { className: "user-actions" },
                          launchHref
                            ? e(
                                "a",
                                {
                                  className: "user-action primary",
                                  href: launchHref,
                                  target: "_self",
                                  rel: "noopener"
                                },
                                "Open " + agent.name + " as this user"
                              )
                            : e(
                                "button",
                                {
                                  className: "user-action primary",
                                  type: "button",
                                  disabled: true
                                },
                                "Agent not live yet"
                              ),
                          e(
                            "button",
                            {
                              className: "user-action secondary",
                              type: "button",
                              onClick: () => removeAccess(user.id),
                              disabled: busy
                            },
                            busy ? "Working..." : "Delete login"
                          )
                        )
                      );
                    })
                  )
                : e(
                    "p",
                    { className: "admin-empty" },
                    "No logins are saved for this agent yet."
                  )
            )
          )
        )
      );
    }

    function AgentLoginPanel({
      agent,
      username,
      password,
      setUsername,
      setPassword,
      errorMessage,
      noteMessage,
      busy,
      onSubmit,
      onCancel
    }) {
      return e(
        "section",
        { className: "agent-login-panel", id: "agent-login", "aria-label": agent.name + " login" },
        e("h2", null, agent.name + " login"),
        e(
          "p",
          null,
          "Enter the login credentials created by the admin for this specific agent."
        ),
        e(
          "form",
          {
            className: "admin-form",
            onSubmit: onSubmit
          },
          e(
            "div",
            { className: "admin-field" },
            e("label", { htmlFor: "agent-login-username" }, "Username"),
            e("input", {
              id: "agent-login-username",
              value: username,
              onChange: (event) => setUsername(event.target.value),
              placeholder: "Enter agent username",
              disabled: busy
            })
          ),
          e(
            "div",
            { className: "admin-field" },
            e("label", { htmlFor: "agent-login-password" }, "Password"),
            e("input", {
              id: "agent-login-password",
              type: "password",
              value: password,
              onChange: (event) => setPassword(event.target.value),
              placeholder: "Enter agent password",
              disabled: busy
            })
          ),
          errorMessage
            ? e("div", { className: "admin-login-error", role: "alert" }, errorMessage)
            : null,
          noteMessage
            ? e("div", { className: "agent-login-note" }, noteMessage)
            : null,
          e(
            "div",
            { className: "agent-login-actions" },
            e(
              "button",
              { className: "admin-button", type: "submit", disabled: busy },
              busy ? "Checking..." : "Continue"
            ),
            e(
              "button",
              {
                className: "user-action secondary",
                type: "button",
                onClick: onCancel,
                disabled: busy
              },
              "Cancel"
            )
          )
        )
      );
    }

    function AdminLoginPanel({ onLogin, errorMessage, username, password, setUsername, setPassword, busy }) {
      return e(
        "section",
        { className: "admin-login-panel", id: "admin", "aria-label": "Admin login" },
        e("h2", null, "Admin login"),
        e(
          "p",
          null,
          "Sign in to manage agent-specific logins stored in MongoDB."
        ),
        e(
          "form",
          {
            className: "admin-form",
            onSubmit: onLogin
          },
          e(
            "div",
            { className: "admin-field" },
            e("label", { htmlFor: "admin-username" }, "Username"),
            e("input", {
              id: "admin-username",
              value: username,
              onChange: (event) => setUsername(event.target.value),
              placeholder: "Shortly",
              disabled: busy
            })
          ),
          e(
            "div",
            { className: "admin-field" },
            e("label", { htmlFor: "admin-password" }, "Password"),
            e("input", {
              id: "admin-password",
              type: "password",
              value: password,
              onChange: (event) => setPassword(event.target.value),
              placeholder: "Enter admin password",
              disabled: busy
            })
          ),
          errorMessage
            ? e("div", { className: "admin-login-error", role: "alert" }, errorMessage)
            : null,
          e(
            "button",
            { className: "admin-button", type: "submit", disabled: busy },
            busy ? "Signing in..." : "Sign in"
          )
        )
      );
    }

    function App() {
      const [adminOpen, setAdminOpen] = useState(false);
      const [agentLogins, setAgentLogins] = useState([]);
      const [activeAgentLoginId, setActiveAgentLoginId] = useState(null);
      const [agentLoginUsername, setAgentLoginUsername] = useState("");
      const [agentLoginPassword, setAgentLoginPassword] = useState("");
      const [agentLoginError, setAgentLoginError] = useState("");
      const [agentLoginNote, setAgentLoginNote] = useState("");
      const [agentLoginBusy, setAgentLoginBusy] = useState(false);
      const [adminAuthenticated, setAdminAuthenticated] = useState(false);
      const [adminUsername, setAdminUsername] = useState("");
      const [adminPassword, setAdminPassword] = useState("");
      const [adminError, setAdminError] = useState("");
      const [adminBusy, setAdminBusy] = useState(false);
      const [adminDataBusy, setAdminDataBusy] = useState(false);

      useEffect(() => {
        let active = true;

        async function hydrateSession() {
          try {
            const session = await apiRequest("/api/session");
            if (!active) {
              return;
            }

            setAdminAuthenticated(Boolean(session.adminAuthenticated));

            if (session.adminAuthenticated) {
              setAdminDataBusy(true);
              const payload = await apiRequest("/api/admin/logins");
              if (!active) {
                return;
              }
              setAgentLogins(payload.logins || []);
            }
          } catch (error) {
            if (active) {
              setAdminError(error.message);
            }
          } finally {
            if (active) {
              setAdminDataBusy(false);
            }
          }
        }

        hydrateSession();
        return () => {
          active = false;
        };
      }, []);

      async function refreshAdminLogins() {
        const payload = await apiRequest("/api/admin/logins");
        setAgentLogins(payload.logins || []);
      }

      function handleAdminToggle() {
        setAdminOpen(!adminOpen);
        setAdminError("");
      }

      function handleOpenAgentLogin(agentId) {
        setActiveAgentLoginId(agentId);
        setAgentLoginUsername("");
        setAgentLoginPassword("");
        setAgentLoginError("");
        setAgentLoginNote("");
      }

      function handleCloseAgentLogin() {
        setActiveAgentLoginId(null);
        setAgentLoginUsername("");
        setAgentLoginPassword("");
        setAgentLoginError("");
        setAgentLoginNote("");
      }

      async function handleAgentLoginSubmit(event) {
        event.preventDefault();
        setAgentLoginBusy(true);
        setAgentLoginError("");
        setAgentLoginNote("");

        try {
          const selectedAgent = agentById[activeAgentLoginId];
          const payload = await apiRequest("/api/agent-login", {
            method: "POST",
            body: JSON.stringify({
              agentId: activeAgentLoginId,
              username: agentLoginUsername.trim(),
              password: agentLoginPassword
            })
          });

          if (!selectedAgent || !selectedAgent.href) {
            setAgentLoginNote("Login accepted. This agent is configured, but its live destination is not available yet.");
            return;
          }

          window.location.href = buildAgentHref(selectedAgent, payload.login);
        } catch (error) {
          setAgentLoginError(error.message);
        } finally {
          setAgentLoginBusy(false);
        }
      }

      async function handleAdminLogin(event) {
        event.preventDefault();
        setAdminBusy(true);
        setAdminError("");

        try {
          await apiRequest("/api/admin/login", {
            method: "POST",
            body: JSON.stringify({
              username: adminUsername.trim(),
              password: adminPassword
            })
          });

          setAdminAuthenticated(true);
          setAdminPassword("");
          setAdminDataBusy(true);
          await refreshAdminLogins();
        } catch (error) {
          setAdminError(error.message);
        } finally {
          setAdminBusy(false);
          setAdminDataBusy(false);
        }
      }

      async function handleAdminLogout() {
        setAdminBusy(true);
        try {
          await apiRequest("/api/admin/logout", { method: "POST" });
        } catch (error) {
          setAdminError(error.message);
        } finally {
          setAdminAuthenticated(false);
          setAdminOpen(false);
          setAdminUsername("");
          setAdminPassword("");
          setAgentLogins([]);
          setAdminBusy(false);
        }
      }

      async function handleCreateLogin(loginInput) {
        setAdminDataBusy(true);
        setAdminError("");

        try {
          const payload = await apiRequest("/api/admin/logins", {
            method: "POST",
            body: JSON.stringify(loginInput)
          });
          setAgentLogins((current) => current.concat(payload.login));
          return true;
        } catch (error) {
          setAdminError(error.message);
          return false;
        } finally {
          setAdminDataBusy(false);
        }
      }

      async function handleDeleteLogin(loginId) {
        setAdminDataBusy(true);
        setAdminError("");

        try {
          await apiRequest("/api/admin/logins/" + loginId, {
            method: "DELETE"
          });
          setAgentLogins((current) => current.filter((login) => login.id !== loginId));
        } catch (error) {
          setAdminError(error.message);
        } finally {
          setAdminDataBusy(false);
        }
      }

      const activeAgent = activeAgentLoginId ? agentById[activeAgentLoginId] : null;

      return e(
        "main",
        { className: "app-shell" },
        e(
          "div",
          { className: "pattern-bg", "aria-hidden": "true" },
          e(
            "div",
            { className: "press" },
            e("div", { className: "sheet" }),
            e("div", { className: "roll" }),
            e("div", { className: "sheet" }),
            e("div", { className: "roll" }),
            e("div", { className: "sheet" }),
            e("div", { className: "roll" }),
            e("div", { className: "sheet" }),
            e("div", { className: "sheet" }),
            e("div", { className: "sheet" }),
            e("div", { className: "sheet" }),
            e("div", { className: "sheet" }),
            e("div", { className: "roll" })
          )
        ),
        e(
          "header",
          { className: "topbar", "aria-label": "Main navigation" },
          e(
            "div",
            { className: "brand", "aria-label": "Shortly Agents brand" },
            e(
              "div",
              { className: "brand-text" },
              e("span", { className: "shortly" }, "shortly"),
              e("span", { className: "agents" }, "agents")
            )
          ),
          e(
            "div",
            { className: "topbar-actions" },
            e(
              "button",
              {
                className: "toggle-chip",
                type: "button",
                onClick: handleAdminToggle,
                "aria-expanded": adminOpen,
                "aria-controls": "admin"
              },
              adminOpen ? "Hide admin side" : "Open admin side"
            ),
            adminAuthenticated
              ? e(
                  "button",
                  {
                className: "toggle-chip",
                type: "button",
                onClick: handleAdminLogout
              },
                  adminBusy ? "Logging out..." : "Log out admin"
                )
              : null
          )
        ),
        e(
          "section",
          { className: "hero" },
          e(
            "div",
            { className: "copy" },
            e("h1", null, "One simple place to open your agents."),
            e(
              "p",
              null,
              "Launch Pix, Shortly AI, and Daily Digest from one cleaner hub, with admin-controlled access and a layout that holds together across mobile, laptop, and large desktop screens."
            )
          ),
          e(
            "section",
            { className: "card-stage", id: "launch-cards", "aria-label": "Agent launch cards" },
            e(
            "div",
            { className: "launch-grid" },
              launchCards.map((card) =>
                e(LaunchCard, { card, onOpenLogin: handleOpenAgentLogin, key: card.id })
              )
            )
          )
        ),
        e(
          "section",
          { className: "details", id: "details", "aria-label": "Agent hub details" },
          details.map((item) => e(DetailCard, item))
        ),
        activeAgent
          ? e(AgentLoginPanel, {
              agent: activeAgent,
              username: agentLoginUsername,
              password: agentLoginPassword,
              setUsername: setAgentLoginUsername,
              setPassword: setAgentLoginPassword,
              errorMessage: agentLoginError,
              noteMessage: agentLoginNote,
              busy: agentLoginBusy,
              onSubmit: handleAgentLoginSubmit,
              onCancel: handleCloseAgentLogin
            })
          : null,
        adminOpen
          ? adminAuthenticated
            ? e(AdminPanel, {
                logins: agentLogins,
                onCreateLogin: handleCreateLogin,
                onDeleteLogin: handleDeleteLogin,
                busy: adminDataBusy,
                requestError: adminError
              })
            : e(AdminLoginPanel, {
                onLogin: handleAdminLogin,
                errorMessage: adminError,
                username: adminUsername,
                password: adminPassword,
                setUsername: setAdminUsername,
                setPassword: setAdminPassword,
                busy: adminBusy
              })
          : null,
        e(
          "footer",
          { className: "footer" },
          adminAuthenticated || adminDataBusy
            ? "Agent login records are served from MongoDB through the local API."
            : "Agent destinations are controlled by their respective deployments."
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(e(App));
  </script>
</body>
</html>
